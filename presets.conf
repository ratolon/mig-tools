# MIG Presets Configuration
# Format: [preset_name]
#         gpu0=id1,id2,id3,...  (comma-separated MIG type IDs)
#         gpu1=id1,id2,...
#         etc.
#
# To apply a preset:
#   1. Select the preset from the menu
#   2. The tool will reset MIG on all GPUs and apply the configuration
#
# Interesting MIGs in A100
#   - 0: 7g.80gb  (7 GPU + 80GB memory)
#   - 5: 4g.40gb  (4 GPU + 40GB memory)
#   - 9: 3g.40gb  (2 GPU + 40GB memory)
#   -14: 2g.20gb  (2 GPU + 20GB memory)
#   -15: 1g.20gb  (1 GPU + 20GB memory)

[unica_gpu_por_dispositivo]
gpu0=0
gpu1=0
gpu2=0
gpu3=0

[todas_por_la_mitad]
gpu0=5,9
gpu1=5,9
gpu2=5,9
gpu3=5,9

[rivero_uso_mixto]
gpu0=5,9
gpu1=9,14,14
gpu2=14,14,14,15
gpu3=14,14,14,15
